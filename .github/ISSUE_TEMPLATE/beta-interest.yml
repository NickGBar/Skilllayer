name: Early access feedback
description: Share optional, sanitized feedback after installation or a sandbox trial.
title: "[Early access] "
labels: [beta-interest]
body:
  - type: markdown
    attributes:
      value: "Do not include source code, API keys, credentials, .env contents, private paths or repository URLs, payment details, or unrelated MCP configuration."
  - type: input
    id: coding-agent
    attributes: { label: Coding agent used, placeholder: "Claude Code, Codex, Cursor, or other" }
    validations: { required: true }
  - type: input
    id: macos
    attributes: { label: macOS version, placeholder: "Example: macOS 15" }
    validations: { required: true }
  - type: textarea
    id: intended-use
    attributes: { label: Intended use, description: "Describe the kind of work without source code or private details." }
    validations: { required: true }
  - type: checkboxes
    id: sandbox
    attributes:
      label: Early-access experience
      options:
        - label: I completed the disposable sandbox test.
          required: false
        - label: I would consider paying for a mature version of this product.
          required: false
  - type: textarea
    id: sanitized-feedback
    attributes: { label: Optional sanitized feedback, description: "Do not include source code, credentials, private paths, or MCP configuration." }
